
<style>
/* Import Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* Background */
body{
    background:#111;
}

/* ==========================
   Login Modal
========================== */

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.75);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Hide Modal Initially */
/*
.modal{
    display:none;
}
*/

.login-box{
    width:380px;
    background:#1a1a1a;
    padding:35px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(255,0,0,0.4);
    position:relative;
    animation:popup .4s ease;
}

/* Popup Animation */

@keyframes popup{
    from{
        transform:scale(.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.login-box h2{
    text-align:center;
    color:#ff3b3b;
    margin-bottom:25px;
}

.close{
    position:absolute;
    right:15px;
    top:10px;
    font-size:30px;
    color:#fff;
    cursor:pointer;
    transition:.3s;
}

.close:hover{
    color:red;
}

/* Input Fields */

.login-box input[type="email"],
.login-box input[type="password"]{
    width:100%;
    padding:14px;
    margin:12px 0;
    border:none;
    border-radius:8px;
    background:#2c2c2c;
    color:#fff;
    font-size:15px;
    outline:none;
    transition:.3s;
}

.login-box input:focus{
    border:2px solid red;
}

/* Remember Me */

.remember{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:18px 0;
    font-size:14px;
    color:white;
}

.remember label{
    display:flex;
    align-items:center;
    gap:5px;
}

.remember a{
    color:#ff4d4d;
    text-decoration:none;
}

.remember a:hover{
    text-decoration:underline;
}

/* Login Button */

button{
    width:100%;
    padding:14px;
    background:#e50914;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#ff1f1f;
    transform:translateY(-2px);
}

/* Register */

.register{
    text-align:center;
    margin-top:20px;
    color:#ccc;
}

.register a{
    color:#ff4d4d;
    text-decoration:none;
    font-weight:600;
}

.register a:hover{
    text-decoration:underline;
}

/* Responsive */

@media(max-width:500px){

    .login-box{
        width:90%;
        padding:25px;
    }

    .login-box h2{
        font-size:24px;
    }

}

/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

/* Header */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 8%;
    background:#111;
    color: white;
    position:sticky;
    top:0;
    z-index:1000;
}

header h1{
    font-size:30px;
    color:#ffcc00;
}

/* Navbar */
nav{
    display:flex;
    align-items:center;
    gap:25px;
}

nav a{
    text-decoration:none;
    color:white;
    font-size:18px;
    font-weight:500;
    transition:.3s;
    padding:8px 15px;
    border-radius:5px;
}

nav a:hover{
    background:#d90429;
    color:#fbf6f6;
}

/* Responsive */
@media(max-width:768px){

    header{
        flex-direction:column;
        gap:15px;
    }

    nav{
        flex-wrap:wrap;
        justify-content:center;
    }

}


</style>

<!-- Header -->
<header>
    <h1>🎬 Movie Ticket Booking</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="movies.html">Movies</a>
        <a href="offers.html">Offers</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<!-- Login Modal -->
<div id="loginModal" class="modal">

    <div class="login-box">

        <span class="close" onclick="closeLogin()">&times;</span>

        <h2>🔐 Login</h2>

        <form>

            <input type="email" placeholder="Email Address" required>

            <input type="password" placeholder="Password" required>

            <div class="remember">
                <label>
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit">Login</button>

            <p class="register">
                Don't have an account?
                <a href="#">Register Now</a>
            </p>

        </form>

    </div>

</div>
