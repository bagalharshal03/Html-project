<style>
    /* LOGIN PAGE  */

    body {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f2f2;
    }

    /* Login Section */

    .login-section {
        padding: 70px 20px;
    }

    .login-container {
        max-width: 600px;
        margin: auto;
        background: #fff;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, .12);
    }

    /* Heading */

    .login-container h1 {
        text-align: center;
        color: #c70039;
        font-size: 48px;
        margin-bottom: 10px;
    }

    .login-container p {
        text-align: center;
        color: #666;
        font-size: 20px;
        margin-bottom: 35px;
    }

    /* Inputs */

    .login-container input[type=email],
    .login-container input[type=password] {

        width: 100%;
        padding: 16px;
        margin-bottom: 20px;
        border: 1px solid #ccc;
        border-radius: 10px;
        font-size: 18px;
        box-sizing: border-box;
        outline: none;
    }

    .login-container input:focus {
        border: 1px solid #c70039;
    }

    /* Remember */

    .login-options {

        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }

    .login-options label {
        color: #555;
        font-size: 16px;
    }

    .login-options a {

        color: #c70039;
        text-decoration: none;
        font-weight: bold;
    }

    .login-options a:hover {
        text-decoration: underline;
    }

    /* Button */

    .login-container button {

        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 10px;
        background: #d90429;
        color: white;
        font-size: 22px;
        cursor: pointer;
        font-weight: bold;
    }

    .login-container button:hover {
        background: #b00020;
    }

    /* Register */

    .register {

        margin-top: 25px;
        text-align: center;
        color: #555;
    }

    .register a {

        color: #c70039;
        font-weight: bold;
        text-decoration: none;
    }

    .register a:hover {
        text-decoration: underline;
    }

    /* Mobile */

    @media(max-width:768px) {

        .login-container {

            padding: 25px;
        }

        .login-container h1 {

            font-size: 36px;
        }

        .login-container p {

            font-size: 16px;
        }

        .login-options {

            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }
    }

    /* Reset */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    /* Header */
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 8%;
        background: #111;
        color: rgb(241, 236, 236);
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    header h1 {
        font-size: 30px;
        color: #ffcc00;
    }

    /* Navbar */
    nav {
        display: flex;
        align-items: center;
        gap: 25px;
    }

    nav a {
        text-decoration: none;
        color: white;
        font-size: 18px;
        font-weight: 500;
        transition: .3s;
        padding: 8px 15px;
        border-radius: 5px;
    }

    nav a:hover {
        background: #d90429;
        color: #f3f1f1;
    }

    /* Responsive */
    @media(max-width:768px) {

        header {
            flex-direction: column;
            gap: 15px;
        }

        nav {
            flex-wrap: wrap;
            justify-content: center;
        }

    }

    /* Offers Section */
    .offers {
        background: #000;
        padding: 60px 8%;
    }

    .offers h2 {
        text-align: center;
        color: #ffd700;
        font-size: 42px;
        margin-bottom: 40px;
    }

    /* Offer Cards Container */
    .offer-container {
        display: flex;
        justify-content: center;
        gap: 30px;
        flex-wrap: wrap;
    }

    /* Offer Cards */
    .offer-card {
        width: 280px;
        background: #1b1b1b;
        color: #faf7f7;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 25px;
        text-align: center;
    }

    .offer-card h3 {
        color: #ff3b3b;
        margin-bottom: 15px;
    }

    .offer-card p {
        color: #f1ebeb;
        line-height: 1.6;
    }

    .offer-card button {
        margin-top: 20px;
        padding: 12px 28px;
        background: #e50914;
        color: #fef7f7;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-size: 16px;
    }

    .offer-card button:hover {
        background: #b20710;
    }

    body {
        background-color: #ffffff;
    }
</style>

<header>
    <h1>🎬 Book My Movie</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="movies.html">Movies</a>
        <a href="offers.html">Offers</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
    </nav>
</header>


<section class="login-section">

    <div class="login-container">

        <h1>🔐 Login</h1>
        <p>Welcome back! Login to book your favorite movies.</p>

        <form>

            <input type="email" placeholder="Email Address" required>

            <input type="password" placeholder="Password" required>

            <div class="login-options">

                <label>
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>

            </div>

            <button type="submit">Login</button>

            <p class="register">
                Don't have an account?
                <a href="#">Register Now</a>
            </p>

        </form>

    </div>

</section>
