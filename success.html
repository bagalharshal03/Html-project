<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Successful</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .success-box {
            background: #222;
            color: white;
            width: 400px;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 0, .3);
        }

        .success-box h1 {
            color: #00ff66;
            margin-bottom: 20px;
        }

        .success-box p {
            margin: 10px 0;
            font-size: 18px;
        }

        .success-box a {
            display: inline-block;
            margin-top: 25px;
            text-decoration: none;
            background: red;
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
        }

        .success-box a:hover {
            background: #c40000;
        }
    </style>
</head>

<body>

    <div class="success-box">

        <h1>✅ Booking Successful</h1>

        <p>Your movie ticket request has been submitted.</p>

        <p>Thank You For Booking!</p>

        <a href="index.html">Back to Home</a>

    </div>

</body>

</html>
